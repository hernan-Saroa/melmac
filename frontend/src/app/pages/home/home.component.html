<nb-layout-column>
  <div class="container">
      <h1 class="text-center title">¿Qué quieres hacer?</h1>
      <div class="row">
          <div class="col-md-4 col-sm-6 col-xs-12 fourth" >
              <div class="text-right">
                  <a href="#"> <img class="img_card" src="./assets/images/home/tomar_un_tour.png" alt=""></a>
              </div>
              <div class="text-right mt-2 mb-5">
                  <span class="span_right">Tomar un tour</span>
              </div>
          </div>
          <div class="col-md-4 col-sm-6 col-xs-12 fourth" *ngFor="let field of data; let i=index;">
              <div  class="center" id="d_{{i}}">
                  <a href="{{field.home_item__path}}"> <img class="img_card" src="./assets/images/home/{{field.home_item__image_name}}" alt=""></a>
              </div>
              <div class="center  mt-2 mb-5" id="d2_{{i}}">
                  <span id="s_{{i}}">{{field.home_item__name}}</span>
              </div>
          </div>
      </div>
  </div>
</nb-layout-column>
