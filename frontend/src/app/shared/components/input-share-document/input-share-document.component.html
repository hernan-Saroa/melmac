<div class="mt-3">
  <nb-form-field>
    <div [ngClass]="error ? 'content-share-document error' : 'content-share-document'" >
      <nb-card class="title-label" style="padding: 0px 5px; position: absolute; z-index: 1; top: -14px; left: 10px; border: none; box-shadow: none">
        <nb-card-body>
          {{inputData.label}}
        </nb-card-body>
      </nb-card>
      <nb-card class="check-box" style="padding: 0px 5px; border: none; box-shadow: none">
        <div>
          <nb-checkbox *ngFor="let checkBox of inputData.checkBoxs"
            [(checked)]="checkBox.value">{{checkBox.key}}</nb-checkbox>
        </div>
      </nb-card>
      <div class="row align-items-center">
        <div class="col-8 pr-0">
          <input *ngIf="inputData.type == shareType.PHONE" class="pr-0" type="number" ng2TelInput nbInput fullWidth
            autocomplete="off" style="padding-left: 38px; padding-right: 0px;"
            class="tel-input-number" [(ngModel)]="phone.phoneNumber" [ng2TelInputOptions]="telOptions"
            (blur)="onBlur(inputData.type, $event)" (intlTelInputObject)="telInputObject($event)">
          <input *ngIf="inputData.type == shareType.EMAIL" class="pr-0" type="email" [(ngModel)]="inputEmail" nbInput
            fullWidth autocomplete="off" placeholder="Correo electrónico" (blur)="onBlur(inputData.type, $event)">
          <input *ngIf="inputData.type == shareType.CONTACT" class="pr-0" type="text" [(ngModel)]="inputContact" nbInput
            fullWidth autocomplete="off" placeholder="Contacto" (blur)="onBlur(inputData.type, $event)">
        </div>
        <div class="col-4 pl-0" style="text-align: end;">
          <div class="d-inline-flex">
            <nb-icon class="expansion-indicator" *ngFor="let action of inputData.actions" [nbTooltip]="setTooltip(action)" status="primary" (click)="onClick(inputData.type, action)"
              [icon]="setIcon(action)"></nb-icon>
          </div>
        </div>
      </div>
      <div class="list-contact" *ngIf="inputShareSelected == inputData.type">
        <nb-card *ngFor="let contact of listaContactos; let i = index" class="box-shadow">
          <nb-card-body style="display: flex;">
            <div class="col-9 pl-0 view-list">{{contact.value}}</div>
            <div class="col-3 pl-0 pr-0">
              <div style="text-align: end">
                <nb-icon icon="edit-outline" nbTooltip="Editar" status="primary" (click)="onEdit(inputData.type, i)"></nb-icon>
                <nb-icon icon="trash-2-outline" nbTooltip="Eliminar" status="primary" (click)="onDelete(inputData.type, i)"></nb-icon>
              </div>
            </div>
          </nb-card-body>
        </nb-card>
        <nb-card *ngIf="viewAttachments(inputData.type)" class="box-shadow">
          <nb-card-body style="display: flex;">
            <div class="col-9 pl-0 view-all" (click)="viewListDialog(inputData.type)">
              <nb-icon icon="attach-2-outline" status="primary"></nb-icon> 
              {{shareOther.VIEW_ATTACHMENTS}}
            </div>
            <div class="col-3 pl-0 pr-0">
              <div style="text-align: end">
                <nb-icon icon="trash-2-outline" nbTooltip="Eliminar" status="primary" (click)="onDelete(inputData.type, -1)"></nb-icon>
              </div>
            </div>
          </nb-card-body>
        </nb-card>
        <nb-card *ngIf="viewAll(inputData.type)" class="box-shadow">
          <nb-card-body style="display: flex;">
            <div class="col-12 pl-0 view-all" (click)="viewListAll(inputData.type)">{{shareOther.VIEW_ALL}}</div>
          </nb-card-body>
        </nb-card>
        <nb-card *ngIf="listaContactos.length == 0 && !viewAttachments(inputData.type)" class="box-shadow">
          <nb-card-body style="display: flex;">
            <div class="col-12 pl-0 view-all">No hay datos</div>
          </nb-card-body>
        </nb-card>
      </div>
    </div>
    <p *ngIf="error" class="caption status-danger">{{errorMessage}}</p>
  </nb-form-field>
</div>
