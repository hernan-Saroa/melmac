<nb-card>
  <nb-card-body class="form-answer-view">
    <nb-tabset fullWidth>
      <nb-tab tabTitle="Previsualización del documento">
        <pdf-viewer class="pdf_view"
            [src]="src"
            [rotation]="0"
            [original-size]="false"
            [show-all]="true"
            [fit-to-page]="false"
            [zoom]="1"
            [zoom-scale]="'page-width'"
            [stick-to-page]="false"
            [render-text]="true"
            [external-link-target]="'blank'"
            [autoresize]="true"
            [show-borders]="false">
        </pdf-viewer>
  </nb-tab>
    </nb-tabset>
